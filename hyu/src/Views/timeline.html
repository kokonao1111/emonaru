<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="timeline.css">
    <title>タイムライン</title>
    <style>
        html, body {
            overflow: hidden;
            height: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <div id="timeline-container">
        <div class="empty-message">読み込み中...</div>
    </div>
    <script>
        // 投稿クリックハンドラー（グローバルスコープ）
        function handlePostClick(index) {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.postTapped) {
                window.webkit.messageHandlers.postTapped.postMessage(index);
            }
        }
        
        // Swiftからデータを受け取るための関数
        function updateTimeline(postsData) {
            const container = document.getElementById('timeline-container');
            
            if (!postsData || postsData.length === 0) {
                container.innerHTML = '<div class="empty-message">まだ投稿がありません</div>';
                return;
            }
            
            // 新着順にソート
            const sortedPosts = postsData.sort((a, b) => {
                return new Date(b.createdAt) - new Date(a.createdAt);
            });
            
            container.innerHTML = sortedPosts.map((post, index) => {
                const emoji = getEmoji(post.level);
                const levelText = getLevelText(post.level);
                const timeAgo = formatDate(post.createdAt);
                const color = getColorHex(post.level);
                const hasLocation = post.hasLocation;
                const clickable = hasLocation ? 'onclick="handlePostClick(' + index + ')" style="cursor: pointer;"' : '';
                
                return `
                    <div class="post-card" ${clickable} data-index="${index}">
                        <div class="post-emoji">${emoji}</div>
                        <div class="post-content">
                            <div class="post-level">${levelText}</div>
                            <div class="post-meta">
                                <span class="post-time">${timeAgo}</span>
                                ${post.supportCount > 0 ? `<span class="post-stat">${post.isSadEmotion ? '💪' : '🤗'} ${post.supportCount}</span>` : ''}
                            </div>
                        </div>
                        <div class="post-value" style="background-color: ${color};">${post.level}</div>
                    </div>
                `;
            }).join('');
            
            // コンテンツ更新後に高さを通知（Swift側で取得できるように）
            setTimeout(() => {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.heightUpdate) {
                    const height = container.scrollHeight;
                    window.webkit.messageHandlers.heightUpdate.postMessage(height);
                }
            }, 100);
        }
        
        function getEmoji(level) {
            if (level <= -4) return '😢';
            if (level <= -2) return '😔';
            if (level === -1) return '😐';
            if (level === 0) return '😊';
            if (level === 1) return '😄';
            if (level <= 3) return '😃';
            return '🤩';
        }
        
        function getLevelText(level) {
            const texts = {
                '-5': 'とても悲しい',
                '-4': '悲しい',
                '-3': '少し悲しい',
                '-2': 'やや悲しい',
                '-1': '少し低い',
                '0': '普通',
                '1': '少し高い',
                '2': 'やや嬉しい',
                '3': '少し嬉しい',
                '4': '嬉しい',
                '5': 'とても嬉しい'
            };
            return texts[level.toString()] || '普通';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);
            
            if (diffSec < 60) return diffSec + '秒前';
            if (diffMin < 60) return diffMin + '分前';
            if (diffHour < 24) return diffHour + '時間前';
            if (diffDay < 7) return diffDay + '日前';
            
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return month + '/' + day;
        }
        
        function getColorHex(level) {
            const t = (level + 5) / 10;
            const hue = 0.62 - 0.62 * t;
            
            // HSLからRGBに変換
            const h = hue * 360;
            const s = 0.7;
            const l = 0.9;
            
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            
            let r, g, b;
            if (h >= 0 && h < 60) {
                r = c; g = x; b = 0;
            } else if (h >= 60 && h < 120) {
                r = x; g = c; b = 0;
            } else if (h >= 120 && h < 180) {
                r = 0; g = c; b = x;
            } else if (h >= 180 && h < 240) {
                r = 0; g = x; b = c;
            } else if (h >= 240 && h < 300) {
                r = x; g = 0; b = c;
            } else {
                r = c; g = 0; b = x;
            }
            
            r = Math.round((r + m) * 255);
            g = Math.round((g + m) * 255);
            b = Math.round((b + m) * 255);
            
            const rHex = r.toString(16).padStart(2, '0');
            const gHex = g.toString(16).padStart(2, '0');
            const bHex = b.toString(16).padStart(2, '0');
            
            return '#' + rHex + gHex + bHex;
        }
    </script>
</body>
</html>
